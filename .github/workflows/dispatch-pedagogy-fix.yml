name: Dispatch pending workbook correction

on:
  push:
    paths:
      - .github/workflows/dispatch-pedagogy-fix.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Start correction workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run apply-pedagogy-fix.yml --repo "$GITHUB_REPOSITORY"

name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit & content tests
        run: npm test
      - name: Build
        run: npm run build

  # The rules Yaniv repeats most — drawings big enough to write on, nothing cut
  # off the page, labels not printing backwards, 13px body text — can only be
  # checked by measuring a real render. Without this job they were verified by
  # hand, which means whenever nobody looked, they were not verified at all.
  visual-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Measured checks (A4 layout, sizes, Hebrew direction, 13px)
        run: npm run test:visual
      - name: Keep the failure trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

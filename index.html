<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מערכת צירים - הרביע הראשון</title>
<style>
html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:#eef1f5;color:#1f2a44}
.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}
.loading-card{max-width:620px;padding:24px;background:#fff;border:1px solid #cbd3df;border-radius:14px;box-shadow:0 8px 28px #1f2a4420}
.loading-card strong{display:block;font-size:20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="loading"><div class="loading-card"><strong>טוען את החוברת המעודכנת…</strong><span>34 עמודים</span></div></div>

<script id="runtime-workbook-loader">
(async () => {
  const BASELINE =
    'https://raw.githubusercontent.com/yanivmizrachiy/coordinate-first-quadrant/' +
    'a9087db7affc6c14b612b929c89d437fc130afcf/index.html';

  const trueFalseSets = [
    {
      pattern: [true,false,true,false,false],
      truth: [
        'x ציר הוא הציר האופקי.',
        'ראשית הצירים נמצאת על שני הצירים.',
        'המספרים על y ציר גדלים כשזזים למעלה.'
      ],
      falsehood: [
        'y ציר הוא הציר האופקי.',
        'המספרים על x ציר גדלים כשזזים שמאלה.',
        'המספרים על y ציר גדלים כשזזים למטה.'
      ]
    },
    {
      pattern: [true,false,true,false],
      truth: [
        'ראשית הצירים היא (0,0).',
        'ברביע הראשון שני שיעורי הנקודה אינם שליליים.'
      ],
      falsehood: [
        'x ציר הוא הציר האנכי.',
        'הנקודה (3,0) נמצאת על y ציר.'
      ]
    },
    {
      pattern: [true,false,true,false,true],
      truth: [
        'B נמצאת על x ציר.',
        'A נמצאת מעל x ציר.',
        'D נמצאת מימין ל־y ציר.'
      ],
      falsehood: [
        'C נמצאת מימין ל־y ציר.',
        'E נמצאת מימין ל־y ציר.'
      ]
    }
  ];

  const genericTrue = [
    'כאשר נקודה זזה ימינה, שיעור ה־x שלה גדל.',
    'כאשר נקודה זזה למעלה, שיעור ה־y שלה גדל.',
    'נקודות בעלות אותו שיעור x נמצאות על ישר אנכי.',
    'נקודות בעלות אותו שיעור y נמצאות על ישר אופקי.',
    'לנקודה על x ציר שיעור y שווה ל־0.'
  ];
  const genericFalse = [
    'כאשר נקודה זזה ימינה, שיעור ה־y שלה גדל תמיד.',
    'כאשר נקודה זזה למעלה, שיעור ה־y שלה קטן.',
    'נקודות בעלות אותו שיעור x נמצאות על ישר אופקי.',
    'נקודות בעלות אותו שיעור y נמצאות על ישר אנכי.',
    'לנקודה על y ציר שיעור y שווה תמיד ל־0.'
  ];

  const optionHtml = (name) =>
    '<div class="tf-options" role="group" aria-label="סמנו נכון או לא נכון">' +
      '<label class="tf-option"><input type="radio" name="' + name + '" value="true"><span>נכון</span></label>' +
      '<label class="tf-option"><input type="radio" name="' + name + '" value="false"><span>לא נכון</span></label>' +
    '</div>';

  const normalizeMovement = (html) => {
    const replacements = [
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05d9\u05dd \u05d9\u05de\u05d9\u05e0\u05d4','זזים ימינה'],
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05d9\u05dd \u05e9\u05de\u05d0\u05dc\u05d4','זזים שמאלה'],
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05d9\u05dd \u05dc\u05de\u05e2\u05dc\u05d4','זזים למעלה'],
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05d9\u05dd \u05dc\u05de\u05d8\u05d4','זזים למטה'],
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05d9\u05dd','זזים'],
      ['\u05de\u05ea\u05e7\u05d3\u05de\u05ea','זזה'],
      ['\u05de\u05ea\u05e7\u05d3\u05dd','זז']
    ];
    for (const [from,to] of replacements) html = html.split(from).join(to);
    return html;
  };

  const insertStyles = (doc) => {
    const style = doc.createElement('style');
    style.id = 'smart-grayscale-and-answer-boxes';
    style.textContent = `
      .tf-options{display:grid;grid-template-columns:1fr 1.35fr;gap:7px;align-items:center;justify-content:center;min-width:150px}
      .tf-option{display:inline-flex;align-items:center;justify-content:flex-start;gap:5px;white-space:nowrap;cursor:pointer;font-weight:700}
      .tf-option input{appearance:none;-webkit-appearance:none;width:18px;height:18px;margin:0;border:1.8px solid #334155;border-radius:3px;background:#fff;display:grid;place-content:center;flex:0 0 auto}
      .tf-option input:checked::after{content:"✓";font-size:15px;line-height:1;font-weight:900;color:#111827;transform:translateY(-1px)}
      .tf-table td:last-child{width:38%;min-width:170px;padding-inline:8px}
      .mist-head{align-items:center;gap:8px}
      .mist-head>.tf-options{display:flex;min-width:auto;gap:8px;font-size:11px;font-weight:700}
      .mist-head>.tf-options .tf-option{gap:3px}
      .mist-head>.tf-options input{width:15px;height:15px}
      @media(max-width:850px){.tf-table td:last-child{min-width:0;width:43%}.tf-options{min-width:0;grid-template-columns:1fr;gap:4px}}
      @media print{.tf-option input{width:4.2mm;height:4.2mm;border-width:.45mm}.mist-head>.tf-options input{width:3.7mm;height:3.7mm}.tf-option input:checked::after{font-size:11px}}
      body.grayscale-mode{--ink:#111;--muted:#454545;--blue:#202020;--paper:#fff;--screen:#d8d8d8;--border:#8a8a8a;--soft:#e7e7e7;filter:none}
      body.grayscale-mode .toolbar{background:rgba(248,248,248,.97);border-bottom-color:#777}
      body.grayscale-mode .toolbar .primary,body.grayscale-mode .toolbar .download,body.grayscale-mode #printGrayscale{background:#111;color:#fff;border-color:#111}
      body.grayscale-mode .sheet-header{border-bottom-color:#222!important}
      body.grayscale-mode .sheet-header h1{color:#111!important}
      body.grayscale-mode .sheet-number,body.grayscale-mode .remote-page-number{color:#111!important;border-color:#111!important;background:#f5f5f5!important}
      body.grayscale-mode .q-card{border-color:#888}
      body.grayscale-mode .q-card h3{background:#e2e2e2!important;color:#111!important;border-bottom-color:#888!important}
      body.grayscale-mode .rule-box{background:#e6e6e6!important;border-right-color:#222!important}
      body.grayscale-mode .note-box{background:#f2f2f2!important;border-right-color:#666!important}
      body.grayscale-mode .work-table th{background:#d9d9d9!important}
      body.grayscale-mode .work-table td,body.grayscale-mode .work-table th,body.grayscale-mode .tf-table td{border-color:#777!important}
      body.grayscale-mode .choice,body.grayscale-mode .mist-card,body.grayscale-mode .axis-answer-box{border-color:#777!important;background:#fff!important}
      body.grayscale-mode .mist-head{background:#dedede!important;color:#111!important}
      body.grayscale-mode .coordinate-grid,body.grayscale-mode .remote-sheet iframe{filter:grayscale(1) contrast(1.18)}
      body.grayscale-mode .gz-footer{border-top-color:#333!important}
      body.grayscale-mode .gz-footer .f1,body.grayscale-mode .gz-footer .f2{color:#222!important}
      body.grayscale-mode .tf-option input{border-color:#111;background:#fff}
      body.grayscale-mode .answer-line,body.grayscale-mode .blank,body.grayscale-mode .word-blank{border-color:#222!important}
      @media print{body.grayscale-mode{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}body.grayscale-mode .sheet{box-shadow:none!important}body.grayscale-mode .q-card h3{background:#e4e4e4!important}body.grayscale-mode .rule-box{background:#e9e9e9!important}body.grayscale-mode .note-box{background:#f4f4f4!important}}
    `;
    doc.head.appendChild(style);
  };

  const patchTrueFalseTables = (doc) => {
    doc.querySelectorAll('.tf-table').forEach((table, tableIndex) => {
      const rows = [...table.querySelectorAll('tr')];
      const config = trueFalseSets[tableIndex];
      const fallbackPattern = rows.map((_,i) => (i + tableIndex) % 2 === 0);
      const pattern = config?.pattern?.length === rows.length ? config.pattern : fallbackPattern;
      let ti = 0, fi = 0;
      rows.forEach((row,rowIndex) => {
        const cells = row.querySelectorAll('td');
        if (cells.length < 2) return;
        const isTrue = Boolean(pattern[rowIndex]);
        const source = isTrue ? (config?.truth || genericTrue) : (config?.falsehood || genericFalse);
        const statement = source[(isTrue ? ti++ : fi++) % source.length];
        cells[0].textContent = statement;
        cells[cells.length - 1].innerHTML = optionHtml(`tf-${tableIndex + 1}-${rowIndex + 1}`);
        row.dataset.answer = String(isTrue);
      });
      table.dataset.balanced = 'true';
    });
  };

  const patchErrorGrid = (doc) => {
    const cards = [...doc.querySelectorAll('#page-25 .error-grid .mist-card')];
    if (!cards.length) return;
    const statements = [
      ['false','התקבל x=3, y=5 ונכתב (5,3).'],
      ['true','הנקודה (5,0) נמצאת על x ציר.'],
      ['false','הנקודה (0,4) נמצאת מימין ל־y ציר.'],
      ['true','אותו שיעור x פירושו שהנקודות נמצאות על אותו קו אנכי.'],
      ['false','בנקודה (3,6), שיעור y גדול ב־2 משיעור x.'],
      ['true','מזיזים את (2,4) שלוש יחידות ימינה ומקבלים (5,4).'],
      ['false','בקטע המקביל ל־x ציר, שיעור x זהה בשתי הנקודות.']
    ];
    cards.forEach((card,index) => {
      const [answer,statement] = statements[index % statements.length];
      card.dataset.answer = answer;
      const p = card.querySelector('p');
      if (p) p.textContent = statement;
      const head = card.querySelector('.mist-head');
      if (head) {
        head.querySelector('.choice-row')?.remove();
        head.querySelector('.tf-options')?.remove();
        head.insertAdjacentHTML('beforeend', optionHtml(`tf-error-${index + 1}`));
      }
    });
    const grid = cards[0].closest('.error-grid');
    if (grid) grid.dataset.balanced = 'true';
  };

  const addControls = (doc) => {
    const controls = doc.querySelector('.toolbar-controls');
    if (controls && !doc.getElementById('toggleGrayscale')) {
      controls.insertAdjacentHTML('beforeend',
        '<button id="toggleGrayscale" type="button" aria-pressed="false">תצוגת שחור־לבן</button>' +
        '<button id="printGrayscale" type="button">הדפסה שחור־לבן</button>');
    }
    const script = doc.createElement('script');
    script.id = 'smart-grayscale-controls';
    script.textContent = `
      (()=> {
        const body=document.body;
        const toggle=document.getElementById('toggleGrayscale');
        const printButton=document.getElementById('printGrayscale');
        const key='coordinate-first-quadrant-grayscale';
        const apply=(enabled)=>{
          body.classList.toggle('grayscale-mode',enabled);
          if(toggle){
            toggle.setAttribute('aria-pressed',enabled?'true':'false');
            toggle.textContent=enabled?'חזרה לתצוגת צבע':'תצוגת שחור־לבן';
          }
          try{localStorage.setItem(key,enabled?'1':'0')}catch(_){}
        };
        let saved=false;
        try{saved=localStorage.getItem(key)==='1'}catch(_){}
        apply(saved);
        toggle?.addEventListener('click',()=>apply(!body.classList.contains('grayscale-mode')));
        printButton?.addEventListener('click',()=>{apply(true);requestAnimationFrame(()=>setTimeout(()=>window.print(),80))});
      })();
    `;
    doc.body.appendChild(script);
  };

  try {
    const response = await fetch(BASELINE, {cache:'no-store'});
    if (!response.ok) throw new Error(`טעינת בסיס החוברת נכשלה: HTTP ${response.status}`);
    let source = normalizeMovement(await response.text());
    const doc = new DOMParser().parseFromString(source,'text/html');
    insertStyles(doc);
    patchTrueFalseTables(doc);
    patchErrorGrid(doc);
    addControls(doc);
    const output = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    document.open();
    document.write(output);
    document.close();
  } catch (error) {
    document.body.innerHTML =
      '<div class="loading"><div class="loading-card"><strong>לא ניתן לטעון את החוברת.</strong><p>' +
      String(error?.message || error) + '</p></div></div>';
    console.error(error);
  }
})();
</script>
</body>
</html>
